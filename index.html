function cloudSaveAll(){if(!CLOUD||!cloudReady)return;state.snippets.forEach(function(s){cloudSaveSnippet(s,true).catch(function(e){console.warn("Supabase 저장 실패",e);cloudStatus("로컬 저장","local")})})}
function clone(x){return JSON.parse(JSON.stringify(x))}
function bind(){els.q.oninput=renderGrid;els.addCat.onclick=addCat;els.catName.onkeydown=function(e){if(e.key==="Enter")addCat()};els.renameCat.onclick=renameCat;els.recent.onclick=function(){toggleFilter("recent")};els.sortTabs.forEach(function(tab){tab.onclick=function(){state.sort=tab.dataset.sort;save();renderGrid()}});$("#newBtn").onclick=function(){clearForm(true)};$("#clearBtn").onclick=function(){closeEditor()};els.form.onsubmit=saveSnippet;els.body.oninput=updatePreview;els.title.oninput=updatePreview;els.tags.oninput=updatePreview;els.category.onchange=updatePreview;$("#copyDraft").onclick=function(){copyText(rendered(),"문구를 복사했습니다.")};document.onkeydown=function(e){if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();els.q.focus()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="n"){e.preventDefault();clearForm(true)}if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();copyText(rendered(),"문구를 복사했습니다.")}}}
function render(){cleanCats();renderCats();renderSelect();renderStats();renderGrid();updatePreview()}
function renderCats(){var items=[{id:"all",name:"전체 문구",count:state.snippets.length}];state.categories.forEach(function(name){items.push({id:name,name:name,count:state.snippets.filter(function(s){return s.category===name}).length})});var out="";items.forEach(function(c){out+='<button class="cat '+(state.selected===c.id?'active':'')+'" data-cat="'+esc(c.id)+'" title="'+esc(c.name)+'"><svg class="ico" viewBox="0 0 24 24"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/></svg><span>'+html(c.name)+'</span><span class="count">'+c.count+'</span></button>'});els.cats.innerHTML=out;els.cats.querySelectorAll("[data-cat]").forEach(function(b){b.onclick=function(){state.selected=b.dataset.cat;state.filter="all";save();renderCats();renderGrid()}})}
function renderSelect(){els.category.innerHTML=state.categories.map(function(c){return '<option value="'+esc(c)+'">'+html(c)+'</option>'}).join("")}
function renderStats(){if(!els.total||!els.copies)return;els.total.textContent=state.snippets.length;els.copies.textContent=state.snippets.reduce(function(a,s){return a+(+s.copies||0)},0)}
function renderGrid(){var arr=state.snippets.slice();var q=clean(els.q.value).toLowerCase();if(state.selected!=="all")arr=arr.filter(function(s){return s.category===state.selected});if(state.filter==="favorites")state.filter="all";if(state.filter==="recent")arr=arr.filter(function(s){return s.lastCopiedAt});if(q)arr=arr.filter(function(s){return [s.title,s.category,s.body].concat(s.tags||[]).join(" ").toLowerCase().includes(q)});arr.sort(sorter);els.sortTabs.forEach(function(tab){tab.classList.toggle("active",tab.dataset.sort===(state.sort||"updated"))});els.recent.classList.toggle("soft",state.filter==="recent");if(!arr.length){els.grid.className="grid";els.grid.innerHTML='<div class="empty"><div><strong>보이는 문구가 없습니다.</strong><p>새 문구를 추가하거나 검색 조건을 바꿔보세요.</p><button class="btn primary" id="emptyAdd" type="button">＋ 문구 추가</button></div></div>';$("#emptyAdd").onclick=function(){clearForm(true)};return}if(state.selected==="all"){els.grid.className="groupedView";els.grid.innerHTML=renderGroupedSections(arr)}else{els.grid.className="grid";els.grid.innerHTML=arr.map(card).join("")}bindCards()}
function renderGroupedSections(arr){var groups=state.categories.map(function(category){return{category:category,items:arr.filter(function(s){return s.category===category})}}).filter(function(group){return group.items.length});var known=state.categories.reduce(function(set,category){set[category]=true;return set},{});var extra=arr.filter(function(s){return !known[s.category]});if(extra.length)groups.push({category:"기타",items:extra});return groups.map(function(group){return '<section class="categorySection"><div class="categorySectionHead"><h2>'+html(group.category)+'</h2><span>'+group.items.length+'</span></div><div class="sectionGrid">'+group.items.map(card).join("")+'</div></section>'}).join("")}
function bindCards(){els.grid.querySelectorAll("[data-act]").forEach(function(b){b.onclick=cardAction});els.grid.querySelectorAll(".card").forEach(function(c){c.onclick=function(e){if(e.target.closest("button"))return;select(c.dataset.id)}})}
function card(s){var tagList=(s.tags||[]).map(clean).filter(Boolean);var tags=tagList.length?'<div class="chips">'+tagList.map(function(t){return '<span class="tag">'+html(t)+'</span>'}).join("")+'</div>':'';return '<article class="card '+(s.id===selectedId?'sel':'')+'" data-id="'+esc(s.id)+'"><div class="cardHead"><div class="title"><h3>'+html(s.title)+'</h3></div>'+tags+'</div><div class="body">'+html(s.body)+'</div><div class="foot"><button class="btn primary small" data-act="copy" data-id="'+esc(s.id)+'" type="button">⧉ 복사</button><button class="btn icon small" data-act="edit" data-id="'+esc(s.id)+'" type="button" title="편집">✎</button><button class="btn icon small danger" data-act="del" data-id="'+esc(s.id)+'" type="button" title="삭제">×</button></div></article>'}
function titleForView(){if(state.filter==="recent")return"최근 사용";if(state.selected==="all")return"전체 문구";return state.selected}
function sorter(a,b){if(state.sort==="title")return a.title.localeCompare(b.title,"ko");if(state.sort==="popular")return(+b.copies||0)-(+a.copies||0);if(state.sort==="copied")return(+b.lastCopiedAt||0)-(+a.lastCopiedAt||0);return(+b.updatedAt||0)-(+a.updatedAt||0)}
function cardAction(e){e.stopPropagation();var act=e.currentTarget.dataset.act;var nid=e.currentTarget.dataset.id;if(act==="copy")copySnippet(nid);if(act==="edit")select(nid);if(act==="del")del(nid)}
function select(nid){selectedId=nid;vars={};openEditor();loadSelected();renderGrid();updatePreview();if(innerWidth<=1180)document.querySelector(".editor").scrollIntoView({behavior:"smooth",block:"start"})}
function loadSelected(){var s=find(selectedId);if(!s){clearForm(false);return}els.editTitle.textContent="문구 편집";els.id.value=s.id;els.title.value=s.title;els.category.value=state.categories.includes(s.category)?s.category:state.categories[0];els.tags.value=(s.tags||[]).join(", ");els.body.value=s.body}
function openEditor(){els.editor.classList.remove("collapsed");els.app.classList.remove("editor-closed")}function closeEditor(){els.editor.classList.add("collapsed");els.app.classList.add("editor-closed");selectedId=null;renderGrid()}function clearForm(focus){openEditor();selectedId=null;vars={};els.editTitle.textContent="문구 작성";els.id.value="";els.title.value="";els.category.value=state.selected!=="all"?state.selected:state.categories[0];els.tags.value="";els.body.value="";renderGrid();updatePreview();if(focus)els.title.focus()}
async function saveSnippet(e){e.preventDefault();var old=find(els.id.value);var nid=els.id.value||id();var t=Date.now();var item={id:nid,title:clean(els.title.value)||"제목 없음",category:els.category.value||state.categories[0],tags:uniq(String(els.tags.value).split(",").map(clean).filter(Boolean)),body:els.body.value.trim(),favorite:old&&old.favorite||false,copies:old&&old.copies||0,lastCopiedAt:old&&old.lastCopiedAt||null,createdAt:old&&old.createdAt||t,updatedAt:t};var i=state.snippets.findIndex(function(s){return s.id===nid});if(i>=0)state.snippets[i]=item;else state.snippets.unshift(item);selectedId=null;save();render();closeEditor();toast(i>=0?"문구를 수정했습니다.":"새 문구를 저장했습니다.");try{await cloudSaveSnippet(item,i>=0)}catch(err){console.warn("Supabase 저장 실패",err);cloudStatus("로컬 저장","local");toast("온라인 저장은 확인이 필요합니다.")}}
function addCat(){var name=clean(els.catName.value);if(!name)return toast("카테고리 이름을 입력해 주세요.");if(state.categories.includes(name))return toast("이미 있는 카테고리입니다.");state.categories.push(name);state.selected=name;els.catName.value="";save();render();toast("카테고리를 추가했습니다.")}
function renameCat(){var cur=state.selected;if(cur==="all")return toast("변경할 카테고리를 선택해 주세요.");var next=clean(prompt("새 카테고리 이름",cur)||"");if(!next||next===cur)return;if(state.categories.includes(next))return toast("이미 있는 카테고리입니다.");state.categories=state.categories.map(function(c){return c===cur?next:c});state.snippets=state.snippets.map(function(s){return s.category===cur?Object.assign({},s,{category:next,updatedAt:Date.now()}):s});state.selected=next;save();render();cloudSaveAll();toast("카테고리 이름을 변경했습니다.")}
function toggleFilter(f){state.filter=state.filter===f?"all":f;save();renderCats();renderGrid()}
async function del(nid){var s=find(nid);if(!s||!confirm("'"+s.title+"' 문구를 삭제할까요?"))return;state.snippets=state.snippets.filter(function(x){return x.id!==nid});if(selectedId===nid)selectedId=null;save();render();toast("문구를 삭제했습니다.");try{await cloudDeleteSnippet(s)}catch(err){console.warn("Supabase 삭제 실패",err);cloudStatus("로컬 저장","local");toast("온라인 삭제는 확인이 필요합니다.")}}
async function copySnippet(nid){var s=find(nid);if(!s)return;if(selectedId!==nid){selectedId=nid;vars={};loadSelected();updatePreview()}var names=extract(s.body);if(names.length){openVariableCopyModal(s,names);return}await finishCopySnippet(s,s.body)}
async function finishCopySnippet(s,text){var ok=await copyText(text,"문구를 복사했습니다.");if(ok){state.snippets=state.snippets.map(function(x){return x.id===s.id?Object.assign({},x,{copies:(+x.copies||0)+1,lastCopiedAt:Date.now(),updatedAt:Date.now()}):x});save();renderStats();renderGrid();var updated=find(s.id);if(updated)cloudSaveSnippet(updated,true).catch(function(e){console.warn("Supabase 복사 횟수 저장 실패",e);cloudStatus("로컬 저장","local")})}return ok}
function openVariableCopyModal(s,names){var modal=document.getElementById("variableCopyModal");if(!modal){modal=document.createElement("div");modal.className="modalBg";modal.id="variableCopyModal";modal.innerHTML='<div class="modal"><div class="modalHead"><h2>변수 입력</h2><button class="btn icon" id="closeVariableCopy" type="button">×<span class="sr">닫기</span></button></div><div class="modalBody"><div class="vars" id="variableCopyFields" style="padding:0"></div></div><div class="modalActions"><button class="btn" id="cancelVariableCopy" type="button">취소</button><button class="btn primary" id="runVariableCopy" type="button">복사</button></div></div>';document.body.appendChild(modal);document.getElementById("closeVariableCopy").onclick=function(){modal.classList.remove("open")};document.getElementById("cancelVariableCopy").onclick=function(){modal.classList.remove("open")};modal.onclick=function(e){if(e.target===modal)modal.classList.remove("open")}}var fields=document.getElementById("variableCopyFields");fields.innerHTML=names.map(function(n){return '<div class="field"><label>'+html(n)+'</label><input data-copy-var="'+esc(n)+'" value="'+esc(vars[n]||"")+'" placeholder="'+esc(n)+'"></div>'}).join("");document.getElementById("runVariableCopy").onclick=async function(){fields.querySelectorAll("[data-copy-var]").forEach(function(input){vars[input.dataset.copyVar]=input.value});updatePreview();var done=await finishCopySnippet(s,applyVars(s.body));if(done)modal.classList.remove("open")};modal.classList.add("open");setTimeout(function(){var first=fields.querySelector("input");if(first){first.focus();first.select()}},30)}

function legacyCopy(text){var t=document.createElement("textarea");t.value=text;t.setAttribute("readonly","");t.style.position="fixed";t.style.top="0";t.style.left="0";t.style.width="1px";t.style.height="1px";t.style.opacity="0";document.body.appendChild(t);t.focus();t.select();t.setSelectionRange(0,t.value.length);var ok=false;try{ok=document.execCommand("copy")}catch(e){ok=false}t.remove();return ok}
async function copyText(text,msg){if(!text.trim()){toast("복사할 문구가 없습니다.");return false}if(legacyCopy(text)){toast(msg);return true}try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);toast(msg);return true}}catch(e){}openCopyFallback(text);toast("복사창을 열었습니다.");return true}
function openCopyFallback(text){var modal=document.getElementById("copyFallbackModal");if(!modal){modal=document.createElement("div");modal.className="modalBg";modal.id="copyFallbackModal";modal.innerHTML='<div class="modal"><div class="modalHead"><h2>직접 복사</h2><button class="btn icon" id="closeCopyFallback" type="button">×<span class="sr">닫기</span></button></div><div class="modalBody"><p>브라우저가 자동 복사를 막았습니다.</p><textarea id="copyFallbackText" class="importArea"></textarea></div><div class="modalActions"><button class="btn" id="cancelCopyFallback" type="button">닫기</button><button class="btn primary" id="runCopyFallback" type="button">선택 복사</button></div></div>';document.body.appendChild(modal);document.getElementById("closeCopyFallback").onclick=function(){modal.classList.remove("open")};document.getElementById("cancelCopyFallback").onclick=function(){modal.classList.remove("open")};modal.onclick=function(e){if(e.target===modal)modal.classList.remove("open")};document.getElementById("runCopyFallback").onclick=async function(){var area=document.getElementById("copyFallbackText");var value=area.value;if(legacyCopy(value)){toast("문구를 복사했습니다.");modal.classList.remove("open");return}try{if(navigator.clipboard){await navigator.clipboard.writeText(value);toast("문구를 복사했습니다.");modal.classList.remove("open");return}}catch(e){}area.focus();area.select();toast("선택된 문구를 복사해 주세요.")}}var area=document.getElementById("copyFallbackText");area.value=text;modal.classList.add("open");setTimeout(function(){area.focus();area.select()},30)}
function updatePreview(){var names=extract(els.body.value);Object.keys(vars).forEach(function(k){if(!names.includes(k))delete vars[k]});if(!els.vars||!els.preview)return;els.vars.innerHTML=names.map(function(n){return '<div class="field"><label>'+html(n)+'</label><input data-var="'+esc(n)+'" value="'+esc(vars[n]||"")+'" placeholder="'+esc(n)+'"></div>'}).join("");els.vars.querySelectorAll("[data-var]").forEach(function(i){i.oninput=function(){vars[i.dataset.var]=i.value;els.preview.textContent=rendered()}});els.preview.textContent=rendered()}
function rendered(){return applyVars(els.body.value)}function applyVars(text){return text.replace(/\{\{\s*([^{}]+?)\s*\}\}/g,function(_,n){var k=clean(n);return vars[k]||"{{"+k+"}}"})}function extract(text){return uniq(Array.from(String(text).matchAll(/\{\{\s*([^{}]+?)\s*\}\}/g)).map(function(m){return clean(m[1])}).filter(Boolean))}
function cleanCats(){if(state.filter==="favorites")state.filter="all";var custom=state.categories.map(clean).filter(function(c){return c&&!legacyCategories.includes(c)&&!defaults.categories.includes(c)});state.categories=uniq(defaults.categories.concat(custom));state.snippets=state.snippets.map(function(s){return Object.assign({},s,{category:normalizeCategory(s.category)})});if(state.selected==="uncat"||["all"].concat(state.categories).indexOf(state.selected)<0)state.selected="all"}function normalizeCategory(c){c=clean(c);var map={"AI 프롬프트":"기타 프롬프트","고객 응대":"CRM 안내 멘트","견적/계약":"CRM 안내 멘트","미팅/일정":"CRM 안내 멘트","팔로업":"CRM 안내 멘트","내부 공유":"기타 프롬프트"};return map[c]||c||"기타 프롬프트"}function find(nid){return state.snippets.find(function(s){return s.id===nid})}function uniq(a){return Array.from(new Set(a.filter(Boolean)))}function clean(v){return String(v||"").trim().replace(/\s+/g," ")}function id(){if(window.crypto&&crypto.randomUUID)return crypto.randomUUID();return"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==="x"?r:r&3|8;return v.toString(16)})}function html(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function esc(v){return html(v).replace(/\x60/g,"&#096;")}function toast(msg){var d=document.createElement("div");d.textContent=msg;els.toast.appendChild(d);setTimeout(function(){d.style.opacity="0";d.style.transform="translateY(6px)"},2200);setTimeout(function(){d.remove()},2700)}
</script>
